<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crop Recommendation</title>

    <link rel="stylesheet" href="../static/style.css">
</head>

<body>

<div class="container">

    <h1>🌾 Crop Recommendation System 🌾</h1>

    <p>Enter your soil and weather details below.</p>

    <form action="/predict_crop" method="POST">

        <div class="row">

            <div class="input-box">
                <label>🌱 Nitrogen (N)</label>
                <input type="number" name="Nitrogen" placeholder="Enter Nitrogen" required>
            </div>

            <div class="input-box">
                <label>🧪 Phosphorus (P)</label>
                <input type="number" name="Phosphorus" placeholder="Enter Phosphorus" required>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="input-box">
                <label>🍃 Potassium (K)</label>
                <input type="number" name="Potassium" placeholder="Enter Potassium" required>
            </div>

            <div class="input-box">
                <label>🌡 Temperature (°C)</label>
                <input type="number" step="0.01" name="Temperature" placeholder="Enter Temperature" required>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="input-box">
                <label>💧 Humidity (%)</label>
                <input type="number" step="0.01" name="Humidity" placeholder="Enter Humidity" required>
            </div>

            <div class="input-box">
                <label>⚗ Soil pH</label>
                <input type="number" step="0.01" name="Ph" placeholder="Enter Soil pH" required>
            </div>

        </div>

        <br>

        <div class="row">

            <div class="input-box" style="width:100%;">
                <label>🌧 Rainfall (mm)</label>
                <input type="number" step="0.01" name="Rainfall" placeholder="Enter Rainfall" required>
            </div>

        </div>

        <br><br>

        <button type="submit">
            🌾 Recommend Crop
        </button>

    </form>

</div>

</body>
</html>
